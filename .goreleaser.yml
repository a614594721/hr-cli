version: 2

builds:
  - id: hr-cli
    main: .
    binary: hr-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X hr-cli/internal/build.Version={{.Version}}
      - -X hr-cli/internal/build.Date={{.Date}}
      - -X hr-cli/internal/build.Commit={{.Commit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "hr-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: a614594721
    name: hr-cli
  prerelease: auto
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
